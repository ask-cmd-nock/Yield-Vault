[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib", "node_modules"]
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
fs_permissions = [{ access = "read", path = "./script/config" }]

[rpc_endpoints]
robinhood = "https://rpc.mainnet.chain.robinhood.com"

[fuzz]
runs = 512
